<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחולל סיפורים</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f9f9fb;
            --text: #2d3436;
            --paper: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 850px;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 1.8rem; }

        .setup-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .grid-settings {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .grid-settings { grid-template-columns: 1fr; }
            .book { padding: 25px !important; }
            h1 { font-size: 1.5rem; }
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 0.9rem; }
        
        select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background-color: #fff;
            transition: border-color 0.3s;
            box-sizing: border-box;
            appearance: none;
        }

        select:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 100px; font-family: inherit; }
        .full-width { grid-column: 1 / -1; }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .generate-btn:active { transform: scale(0.98); }

        #loading-screen {
            display: none;
            text-align: center;
            padding: 50px 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #eee;
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #story-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .book {
            background: var(--paper);
            width: 100%;
            min-height: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            line-height: 1.7;
            border-right: 12px solid var(--primary);
            box-sizing: border-box;
        }

        .page-image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            margin-bottom: 20px;
            border-radius: 10px;
            background: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .img-spinner {
            width: 35px;
            height: 35px;
            border: 4px solid #ddd;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .page-content {
            white-space: pre-wrap;
            margin-bottom: 40px;
            font-size: 1.1rem;
            color: #2d3436;
        }

        .page-footer {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-weight: bold;
            color: #b2bec3;
            font-size: 0.85rem;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .nav-btn:disabled { opacity: 0.3; }

        #error-msg {
            display: none;
            color: #d63031;
            background: #fff5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fab1a0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>מחולל סיפורים</h1>
        <div id="error-msg"></div>

        <div id="setup-screen" class="setup-box">
            <div class="grid-settings">
                <div class="form-group">
                    <label>דמות ראשית</label>
                    <select id="character">
                        <option value="בלש פרטי">בלש פרטי</option>
                        <option value="ילדה שמדברת עם חיות">ילדה אמיצה</option>
                        <option value="רובוט שרוצה לצייר">רובוט סקרן</option>
                        <option value="אביר שמפחד מדרקונים">אביר פחדן</option>
                        <option value="קוסם מבולבל">קוסם מתחיל</option>
                        <option value="חתול רחוב שחושב שהוא מלך">חתול רחוב</option>
                        <option value="מדענית מפוזרת">מדענית מפוזרת</option>
                        <option value="פיראט עם מחלת ים">פיראט רגיש</option>
                        <option value="חוקר טבע">חוקר טבע</option>
                        <option value="נסיכה עצמאית">נסיכה לוחמת</option>
                        <option value="זמר שאיבד את קולו">זמר מפורסם</option>
                        <option value="כלב שמבין עברית">כלב מדבר</option>
                        <option value="ספרנית אמיצה">ספרנית סודית</option>
                        <option value="מלך במסווה">מלך שהפך לאיכר</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>מקום העלילה</label>
                    <select id="location">
                        <option value="טירה בעננים">טירה בעננים</option>
                        <option value="עיר תת-ימית">עיר תת-ימית</option>
                        <option value="יער לוחש">יער קסום</option>
                        <option value="תחנת חלל">תחנת חלל</option>
                        <option value="ספרייה מכושפת">ספרייה סודית</option>
                        <option value="לונה פארק לילי">לונה פארק</option>
                        <option value="אי הגולגולת">אי בודד</option>
                        <option value="רכבת הזמן">רכבת הזמן</option>
                        <option value="מפעל החלומות">מפעל חלומות</option>
                        <option value="חנות הזיכרונות">חנות עתיקות</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>סוגה</label>
                    <select id="genre">
                        <option value="הרפתקאות">הרפתקאות</option>
                        <option value="מתח">מתח</option>
                        <option value="מדע בדיוני">מדע בדיוני</option>
                        <option value="פנטזיה">פנטזיה</option>
                        <option value="קומדיה">קומדיה</option>
                        <option value="אגדת ילדים">אגדה</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>רעיון לסיפור (אופציונלי)</label>
                    <textarea id="customIdea" placeholder="כתוב כאן רעיון משלך והמחולל ישפר אותו..."></textarea>
                </div>
            </div>
            <button class="generate-btn" id="generateBtn" onclick="generateStory()">צור סיפור מאויר</button>
        </div>

        <div id="loading-screen">
            <div class="spinner"></div>
            <h3>הסיפור בתהליך כתיבה...</h3>
            <p>אנחנו מכינים 10 עמודים ומאיירים אותם עבורך.</p>
        </div>

        <div id="story-screen">
            <div class="book">
                <h2 id="story-title" style="text-align: center; color: var(--primary); margin-top: 0; font-size: 1.4rem;"></h2>
                <div class="page-image-container">
                    <div class="img-spinner" id="img-loader"></div>
                    <img class="page-image" id="page-image">
                    <div id="img-error" style="display: none; font-size: 0.8rem; color: #999;">האיור בטעינה...</div>
                </div>
                <div id="page-content" class="page-content"></div>
                <div class="page-footer" id="page-number"></div>
            </div>
            <div class="nav-controls">
                <button class="nav-btn" id="prevPage" onclick="changePage(-1)">הקודם</button>
                <button class="nav-btn" id="nextPage" onclick="changePage(1)">הבא</button>
            </div>
            <button onclick="location.reload()" style="margin-top:25px; background:none; border:none; color:#b2bec3; text-decoration:underline; cursor:pointer;">התחל סיפור חדש</button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let storyPages = [];
        let currentPage = 0;

        // פונקציה משופרת לטיפול בקריאות API עם לוגים לשגיאות
        async function fetchWithRetry(url, options, retries = 3, backoff = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                    
                    const errorData = await res.json().catch(() => ({}));
                    console.error(`Attempt ${i+1} failed:`, errorData);
                    
                    if (res.status === 429) {
                         await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                         continue;
                    }
                    throw new Error(`Server returned ${res.status}: ${JSON.stringify(errorData)}`);
                } catch (err) {
                    console.warn(`Retry ${i+1} due to error:`, err);
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                }
            }
        }

        async function generateStory() {
            const char = document.getElementById('character').value;
            const loc = document.getElementById('location').value;
            const gen = document.getElementById('genre').value;
            const idea = document.getElementById('customIdea').value;
            const errorDiv = document.getElementById('error-msg');

            errorDiv.style.display = 'none';
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';

            const systemPrompt = `You are a Hebrew story writer. Output a JSON object ONLY.
            The story must have 10 pages. Each page has 'text' (Hebrew paragraph) and 'imagePrompt' (English description for an illustration).
            JSON Structure: {"title": "Story Title", "pages": [{"text": "...", "imagePrompt": "..."}]}`;

            const userQuery = `Genre: ${gen}, Hero: ${char}, Place: ${loc}. ${idea ? 'Context: ' + idea : ''}. Make it 10 pages.`;

            try {
                // שימוש במודל יציב יותר ותיקון מבנה השאילתה
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.7 
                        }
                    })
                });

                if (!response.ok) {
                    const errTxt = await response.text();
                    throw new Error(`API_ERROR: ${response.status}`);
                }

                const data = await response.json();
                
                // חילוץ בטוח של הטקסט
                let resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!resultText) throw new Error("EMPTY_RESPONSE");
                
                const storyData = JSON.parse(resultText);
                
                if (!storyData.pages || storyData.pages.length === 0) throw new Error("INVALID_STORY_FORMAT");

                storyPages = storyData.pages;
                document.getElementById('story-title').textContent = storyData.title || "סיפור חדש";
                
                showStory();
                preloadAllImages(); 
            } catch (error) {
                console.error("Full Generation Error:", error);
                errorDiv.textContent = `חלה שגיאה ביצירת הסיפור. וודא שחיבור האינטרנט תקין ונסה שוב. (קוד: ${error.message.substring(0, 20)})`;
                errorDiv.style.display = 'block';
                document.getElementById('setup-screen').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        async function preloadAllImages() {
            // טעינה מדורגת - מתחילים מהעמוד הראשון
            for (let i = 0; i < storyPages.length; i++) {
                if (storyPages[i].imageUrl) continue;
                try {
                    const imgUrl = await requestImage(storyPages[i].imagePrompt);
                    storyPages[i].imageUrl = imgUrl;
                    if (i === currentPage) updatePageDisplay();
                    // השהייה קלה בין בקשות תמונות כדי למנוע עומס
                    await new Promise(r => setTimeout(r, 500));
                } catch (e) {
                    console.warn(`Image ${i} failed to load`);
                }
            }
        }

        async function requestImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: { prompt: prompt + ", beautiful storybook digital art illustration, vibrant colors" },
                    parameters: { sampleCount: 1 }
                })
            });
            const data = await response.json();
            if (data.predictions && data.predictions[0]) {
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            }
            throw new Error("IMAGE_GEN_FAILED");
        }

        function showStory() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'flex';
            updatePageDisplay();
        }

        function updatePageDisplay() {
            const page = storyPages[currentPage];
            if (!page) return;

            const contentEl = document.getElementById('page-content');
            const imgEl = document.getElementById('page-image');
            const loader = document.getElementById('img-loader');
            const err = document.getElementById('img-error');

            contentEl.textContent = page.text;
            document.getElementById('page-number').textContent = `עמוד ${currentPage + 1} מתוך 10`;
            document.getElementById('prevPage').disabled = currentPage === 0;
            document.getElementById('nextPage').disabled = currentPage === 9;

            if (page.imageUrl) {
                imgEl.src = page.imageUrl;
                imgEl.style.display = 'block';
                loader.style.display = 'none';
                err.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                loader.style.display = 'block';
                err.style.display = 'block';
            }
        }

        function changePage(delta) {
            if (storyPages[currentPage + delta]) {
                currentPage += delta;
                updatePageDisplay();
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }
    </script>
</body>
</html>
