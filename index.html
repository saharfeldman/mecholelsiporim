<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל סיפורים</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f9f9fb;
            --text: #2d3436;
            --paper: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 850px;
            padding: 30px 10px;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }

        .setup-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .grid-settings {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .grid-settings { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        select:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        .full-width { grid-column: 1 / -1; }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .generate-btn:hover { background: #5649c1; transform: translateY(-2px); }

        #loading-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid #eee;
            border-top: 8px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #story-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .book {
            background: var(--paper);
            width: 100%;
            min-height: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            line-height: 1.8;
            border-right: 15px solid var(--primary);
            box-sizing: border-box;
        }

        .page-image-container {
            width: 100%;
            height: 350px;
            margin-bottom: 25px;
            border-radius: 12px;
            background: #f4f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .page-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .img-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .page-content {
            white-space: pre-wrap;
            margin-bottom: 50px;
            font-size: 1.15rem;
            color: #34495e;
        }

        .page-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-weight: bold;
            color: #bdc3c7;
        }

        .nav-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover:not(:disabled) { background: var(--primary); color: white; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #error-msg {
            display: none;
            color: #e74c3c;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>מחולל סיפורים</h1>
        <div id="error-msg"></div>

        <div id="setup-screen" class="setup-box">
            <div class="grid-settings">
                <div class="form-group">
                    <label>דמות ראשית</label>
                    <select id="character">
                        <option value="בלש פרטי">בלש פרטי</option>
                        <option value="ילדה שמדברת עם חיות">ילדה אמיצה</option>
                        <option value="רובוט שרוצה לצייר">רובוט סקרן</option>
                        <option value="אביר שמפחד מדרקונים">אביר פחדן</option>
                        <option value="קוסם מבולבל">קוסם מתחיל</option>
                        <option value="חתול רחוב שחושב שהוא מלך">חתול רחוב</option>
                        <option value="מדענית מפוזרת">מדענית מפוזרת</option>
                        <option value="פיראט עם מחלת ים">פיראט רגיש</option>
                        <option value="חוקר טבע">חוקר טבע</option>
                        <option value="נסיכה עצמאית">נסיכה לוחמת</option>
                        <option value="זמר שאיבד את קולו">זמר מפורסם</option>
                        <option value="טבח עם כוחות על">טבח פלאי</option>
                        <option value="חייזר שהלך לאיבוד">חייזר קטן</option>
                        <option value="רוח רפאים ידידותית">רוח רפאים</option>
                        <option value="ספורטאי עקשן">ספורטאי</option>
                        <option value="בלשית סייבר">בלשית סייבר</option>
                        <option value="שף בין-כוכבי">שף חייזרים</option>
                        <option value="כלב שמבין עברית">כלב מדבר</option>
                        <option value="ספרנית אמיצה">ספרנית סודית</option>
                        <option value="מלך במסווה">מלך שהפך לאיכר</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>מקום העלילה</label>
                    <select id="location">
                        <option value="טירה בעננים">טירה בעננים</option>
                        <option value="עיר תת-ימית">עיר תת-ימית</option>
                        <option value="יער לוחש">יער קסום</option>
                        <option value="תחנת חלל">תחנת חלל</option>
                        <option value="ספרייה מכושפת">ספרייה סודית</option>
                        <option value="לונה פארק לילי">לונה פארק</option>
                        <option value="אי הגולגולת">אי בודד</option>
                        <option value="מערת היהלומים">מערה מאירה</option>
                        <option value="רכבת הזמן">רכבת נוסעת בזמן</option>
                        <option value="השוק המסתורי">שוק עתיק</option>
                        <option value="פסגת העולם">פסגת הר</option>
                        <option value="מפעל החלומות">מפעל חלומות</option>
                        <option value="מוזיאון הלווייתן">מוזיאון בתוך לווייתן</option>
                        <option value="כפר המנגינות">כפר שבו כולם שרים</option>
                        <option value="הגינה ההפוכה">גינה קסומה</option>
                        <option value="תחנת רכבת במדבר">תחנה נטושה</option>
                        <option value="מעבדת הצעצועים">מעבדה בקוטב</option>
                        <option value="עיר הצב">עיר על צב ענק</option>
                        <option value="מגדלור בין-מימדי">מגדלור מסתורי</option>
                        <option value="חנות הזיכרונות">חנות עתיקות</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>סוגה</label>
                    <select id="genre">
                        <option value="הרפתקאות">הרפתקאות</option>
                        <option value="מתח">מתח</option>
                        <option value="מדע בדיוני">מדע בדיוני</option>
                        <option value="פנטזיה">פנטזיה</option>
                        <option value="קומדיה">קומדיה</option>
                        <option value="אגדה">אגדת ילדים</option>
                        <option value="דרמה">דרמה</option>
                        <option value="פעולה">פעולה</option>
                        <option value="בלשי">בלשי</option>
                        <option value="אימה לייט">אימה קלה</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>רעיון לסיפור (אופציונלי)</label>
                    <textarea id="customIdea" placeholder="כתוב כאן רעיון משלך והמחולל ישפר אותו..."></textarea>
                </div>
            </div>
            <button class="generate-btn" id="generateBtn" onclick="generateStory()">צור סיפור מאויר</button>
        </div>

        <div id="loading-screen">
            <div class="spinner"></div>
            <h3>הסופר והצייר עובדים על הסיפור שלך...</h3>
            <p>אנחנו יוצרים 10 עמודים מאוירים.</p>
        </div>

        <div id="story-screen">
            <div class="book">
                <h2 id="story-title" style="text-align: center; color: var(--primary); margin-top: 0;"></h2>
                <div class="page-image-container">
                    <div class="img-spinner" id="img-loader"></div>
                    <img class="page-image" id="page-image">
                    <div id="img-error" style="display: none;">האיור לא נטען.</div>
                </div>
                <div id="page-content" class="page-content"></div>
                <div class="page-footer" id="page-number"></div>
            </div>
            <div class="nav-controls">
                <button class="nav-btn" id="prevPage" onclick="changePage(-1)">הקודם</button>
                <button class="nav-btn" id="nextPage" onclick="changePage(1)">הבא</button>
            </div>
            <button class="restart-btn" onclick="location.reload()" style="margin-top:20px; cursor:pointer; background:none; border:none; text-decoration:underline; color:#999;">התחל מחדש</button>
        </div>
    </div>

    <script>
        const apiKey = "";
        let storyPages = [];
        let currentPage = 0;

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                    await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, backoff * Math.pow(2, i)));
                }
            }
            throw new Error("Request failed");
        }

        async function generateStory() {
            const char = document.getElementById('character').value;
            const loc = document.getElementById('location').value;
            const gen = document.getElementById('genre').value;
            const idea = document.getElementById('customIdea').value;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';

            const systemPrompt = `You are a professional Hebrew author. Write a high-quality story.
            Divide it into EXACTLY 10 pages. Each page should be a detailed paragraph (80-120 words).
            For each page, provide an 'imagePrompt' in English for an AI image generator.
            Use a consistent 'beautiful digital illustration style, vibrant colors' for all prompts.
            Return ONLY a JSON object:
            {
                "title": "Story Title",
                "pages": [{"text": "Hebrew text", "imagePrompt": "English prompt"}]
            }`;

            const userQuery = `Genre: ${gen}, Hero: ${char}, Place: ${loc}. ${idea ? 'Extra idea: ' + idea : ''}. Make it 10 pages long.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const storyData = JSON.parse(data.candidates[0].content.parts[0].text);
                storyPages = storyData.pages;
                document.getElementById('story-title').textContent = storyData.title;
                
                // התחלת טעינה מוקדמת של כל התמונות ברקע
                preloadAllImages();
                
                showStory();
            } catch (error) {
                document.getElementById('error-msg').textContent = "חלה שגיאה. נסה שוב.";
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('setup-screen').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        // פונקציית טעינה מוקדמת - שולחת את כל הבקשות בבת אחת
        function preloadAllImages() {
            storyPages.forEach(async (page, index) => {
                try {
                    const imgUrl = await requestImage(page.imagePrompt);
                    storyPages[index].imageUrl = imgUrl;
                    // אם זה העמוד הנוכחי והוא עדיין בטעינה, נעדכן אותו
                    if (index === currentPage) {
                        updatePageDisplay();
                    }
                } catch (e) {
                    console.error("Failed to preload image " + index);
                }
            });
        }

        async function requestImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: { prompt: prompt },
                    parameters: { sampleCount: 1 }
                })
            });
            const data = await response.json();
            return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
        }

        function showStory() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'flex';
            updatePageDisplay();
        }

        function updatePageDisplay() {
            const page = storyPages[currentPage];
            document.getElementById('page-content').textContent = page.text;
            document.getElementById('page-number').textContent = `עמוד ${currentPage + 1} מתוך 10`;
            document.getElementById('prevPage').disabled = currentPage === 0;
            document.getElementById('nextPage').disabled = currentPage === 9;

            const imgEl = document.getElementById('page-image');
            const loader = document.getElementById('img-loader');
            const err = document.getElementById('img-error');

            if (page.imageUrl) {
                imgEl.src = page.imageUrl;
                imgEl.style.display = 'block';
                loader.style.display = 'none';
                err.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                loader.style.display = 'block';
                err.style.display = 'none';
            }
        }

        function changePage(delta) {
            currentPage += delta;
            updatePageDisplay();
        }
    </script>
</body>
</html>
